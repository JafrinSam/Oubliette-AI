services:
  # 🧠 Redis
  redis:
    image: redis:alpine
    container_name: sentinel-redis
    ports:
      - "6379:6379"
    networks:
      - sentinel-net

  # 🗄️ PostgreSQL
  postgres:
    image: postgres:15-alpine
    container_name: sentinel-db
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: securepassword
      POSTGRES_DB: sentinel_ai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - sentinel-net

  # 🧭 DBeaver Web (CloudBeaver)
  dbeaver:
    image: dbeaver/cloudbeaver:latest
    container_name: sentinel-dbeaver
    ports:
      - "8978:8978"
    # depends_on:
    #   - postgres
    # networks:
    #   - sentinel-net
    volumes:
      - dbeaver-data:/opt/cloudbeaver/workspace

  # 📦 MinIO (S3 Compatible Storage)
  minio:
    image: minio/minio
    container_name: sentinel-minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data
    networks:
      - sentinel-net

volumes:
  pgdata:
  dbeaver-data:
  miniodata:


networks:
  sentinel-net:
    driver: bridge
